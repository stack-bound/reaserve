name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            artifact: reaper_reaserve.so
          - os: macos-latest
            name: macOS
            artifact: reaper_reaserve.dylib
          - os: windows-latest
            name: Windows
            artifact: reaper_reaserve.dll

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DREASERVE_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Find binary
        id: binary
        shell: bash
        run: |
          path=$(find build -name "${{ matrix.artifact }}" -type f | head -1)
          echo "path=$path" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reaper_reaserve-${{ matrix.name }}
          path: ${{ steps.binary.outputs.path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename binaries for release
        run: |
          mkdir release
          cp artifacts/reaper_reaserve-Linux/reaper_reaserve.so   release/reaper_reaserve-linux.so
          cp artifacts/reaper_reaserve-macOS/reaper_reaserve.dylib release/reaper_reaserve-macos.dylib
          cp artifacts/reaper_reaserve-Windows/reaper_reaserve.dll release/reaper_reaserve-windows.dll

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          # Extract the section for this version from CHANGELOG.md
          BODY=$(sed -n "/^## \[${TAG}\]/,/^## \[/{ /^## \[${TAG}\]/d; /^## \[/d; p; }" CHANGELOG.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ReaServe ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: release/*
